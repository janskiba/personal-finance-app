name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm nx run-many -t lint --projects=frontend,backend

      - name: Test
        run: pnpm nx run-many -t test --projects=frontend,backend

      - name: Build
        run: pnpm nx run-many -t build --projects=frontend,backend

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Frontend E2E (Playwright)
        run: pnpm nx e2e-ci frontend-e2e
