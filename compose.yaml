services:
  postgres:
    image: postgres:16-alpine
    container_name: personal-finance-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - personal_finance_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-personal_finance_user} -d ${DATABASE_NAME:-personal_finance}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  personal_finance_postgres_data: